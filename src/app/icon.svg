<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a0a2e"/>
      <stop offset="100%" stop-color="#0A0A0A"/>
    </radialGradient>
    <radialGradient id="coreGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#e040fb"/>
      <stop offset="100%" stop-color="#9c27b0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="outerGlow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="256" height="256" rx="52" fill="url(#bgGrad)"/>

  <!-- Sun spike rays -->
  <g filter="url(#outerGlow)" stroke-linecap="round">
    <line x1="128" y1="128" x2="128" y2="34"  stroke="#f59e0b" stroke-width="2.5" opacity="0.9"/>
    <line x1="128" y1="128" x2="128" y2="222" stroke="#f59e0b" stroke-width="2.5" opacity="0.9"/>
    <line x1="128" y1="128" x2="34"  y2="128" stroke="#f59e0b" stroke-width="2.5" opacity="0.9"/>
    <line x1="128" y1="128" x2="222" y2="128" stroke="#f59e0b" stroke-width="2.5" opacity="0.9"/>
    <line x1="128" y1="128" x2="62"  y2="62"  stroke="#f59e0b" stroke-width="2"   opacity="0.75"/>
    <line x1="128" y1="128" x2="194" y2="62"  stroke="#f59e0b" stroke-width="2"   opacity="0.75"/>
    <line x1="128" y1="128" x2="62"  y2="194" stroke="#f59e0b" stroke-width="2"   opacity="0.75"/>
    <line x1="128" y1="128" x2="194" y2="194" stroke="#f59e0b" stroke-width="2"   opacity="0.75"/>
  </g>

  <!-- Neural network edges -->
  <g filter="url(#glow)" stroke="#c084fc" stroke-width="1.5" opacity="0.7" fill="none">
    <line x1="128" y1="34"  x2="172" y2="80"/>
    <line x1="128" y1="34"  x2="84"  y2="80"/>
    <line x1="222" y1="128" x2="176" y2="84"/>
    <line x1="222" y1="128" x2="176" y2="172"/>
    <line x1="128" y1="222" x2="172" y2="176"/>
    <line x1="128" y1="222" x2="84"  y2="176"/>
    <line x1="34"  y1="128" x2="80"  y2="84"/>
    <line x1="34"  y1="128" x2="80"  y2="172"/>
    <line x1="62"  y1="62"  x2="84"  y2="80"/>
    <line x1="194" y1="62"  x2="172" y2="80"/>
    <line x1="62"  y1="194" x2="84"  y2="176"/>
    <line x1="194" y1="194" x2="172" y2="176"/>
    <line x1="84"  y1="80"  x2="172" y2="80"/>
    <line x1="172" y1="80"  x2="176" y2="172"/>
    <line x1="176" y1="172" x2="84"  y2="176"/>
    <line x1="84"  y1="176" x2="80"  y2="84"/>
  </g>

  <!-- Outer tip nodes -->
  <g filter="url(#glow)" fill="#fbbf24">
    <circle cx="128" cy="34"  r="5"/>
    <circle cx="128" cy="222" r="5"/>
    <circle cx="34"  cy="128" r="5"/>
    <circle cx="222" cy="128" r="5"/>
  </g>
  <g filter="url(#glow)" fill="#fb923c" opacity="0.9">
    <circle cx="62"  cy="62"  r="4"/>
    <circle cx="194" cy="62"  r="4"/>
    <circle cx="62"  cy="194" r="4"/>
    <circle cx="194" cy="194" r="4"/>
  </g>

  <!-- Inner ring nodes -->
  <g filter="url(#glow)" fill="#e879f9">
    <circle cx="84"  cy="80"  r="5.5"/>
    <circle cx="172" cy="80"  r="5.5"/>
    <circle cx="176" cy="172" r="5.5"/>
    <circle cx="80"  cy="172" r="5.5"/>
  </g>

  <!-- Core -->
  <circle cx="128" cy="128" r="22" fill="#7c3aed" opacity="0.35"/>
  <circle cx="128" cy="128" r="16" fill="url(#coreGrad)" filter="url(#glow)"/>
  <circle cx="128" cy="128" r="7"  fill="#ffffff" opacity="0.95"/>
</svg>
